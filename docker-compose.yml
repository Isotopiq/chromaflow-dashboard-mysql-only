# Easypanel-compatible Compose file for CHROMA.LAB.
# Set the environment variables below in Easypanel's Environment tab.

services:
  chroma-lab:
    build:
      context: .
      dockerfile: Dockerfile
    image: chroma-lab:latest
    container_name: chroma-lab
    restart: unless-stopped
    ports:
      - "29473:29473"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "29473"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-all}

      # ---- Core app ----
      APP_URL: ${APP_URL:-}
      JWT_SECRET: ${JWT_SECRET:-}
      BOOTSTRAP_TOKEN: ${BOOTSTRAP_TOKEN:-}

      # ---- Postgres ----
      DATABASE_URL: ${DATABASE_URL:-}

      # ---- S3-compatible storage ----
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_PUBLIC_URL_BASE: ${S3_PUBLIC_URL_BASE:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}

      # ---- SMTP ----
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:29473/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
