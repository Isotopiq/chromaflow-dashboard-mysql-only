# Easypanel-compatible Compose file for CHROMA.LAB.
# In Easypanel: create a "Compose" service pointed at this repo and set the
# environment variables listed below in the service's Environment tab.
# Easypanel injects them at container runtime — no build args, no strict
# ${VAR:?} checks, and ${VAR:-} defaults so missing optional vars do not
# trigger noisy "variable is not set" warnings during deploy.

services:
  chroma-lab:
    build:
      context: .
      dockerfile: Dockerfile
    image: chroma-lab:latest
    container_name: chroma-lab
    restart: unless-stopped
    ports:
      - "5273:5273"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 5273
      # Comma-separated hostnames the preview server will accept,
      # e.g. "app.example.com,science-chromaflow.cu4huf.easypanel.host".
      # Set to "all" to disable the host check (safe only behind a trusted proxy).
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-all}
      # Server-side Supabase config (primary names the app reads)
      LAB_SUPABASE_URL: ${LAB_SUPABASE_URL:-}
      LAB_SUPABASE_ANON_KEY: ${LAB_SUPABASE_ANON_KEY:-}
      LAB_SUPABASE_SERVICE_ROLE_KEY: ${LAB_SUPABASE_SERVICE_ROLE_KEY:-}
      # Standard Supabase aliases (also accepted by the app)
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_PROJECT_ID: ${SUPABASE_PROJECT_ID:-selfhosted}
      # Optional: only needed if Lovable AI features are used
      LOVABLE_API_KEY: ${LOVABLE_API_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5273/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
