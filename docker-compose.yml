# Easypanel-compatible Compose file for CHROMA.LAB.
# In Easypanel: create a "Compose" service pointed at this repo and set the
# environment variables listed below in the service's Environment tab.

services:
  chroma-lab:
    build:
      context: .
      dockerfile: Dockerfile
    image: chroma-lab:latest
    container_name: chroma-lab
    restart: unless-stopped
    ports:
      - "5273:5273"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 5273
      # Comma-separated hostnames the server will accept,
      # e.g. "app.example.com". Use "all" only behind a trusted proxy.
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-all}

      # ---- Core app ----
      APP_URL: ${APP_URL:?set APP_URL (e.g. https://app.example.com)}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET (64+ random chars: openssl rand -hex 32)}
      # Optional one-time token for /api/public/bootstrap-admin. Unset after first admin is created.
      BOOTSTRAP_TOKEN: ${BOOTSTRAP_TOKEN:-}

      # ---- Postgres (self-hosted on Plesk) ----
      # Example: postgresql://user:pass@host:5432/dbname?sslmode=require
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}

      # ---- S3-compatible storage ----
      S3_ENDPOINT: ${S3_ENDPOINT:?set S3_ENDPOINT (e.g. https://s3.amazonaws.com or your provider's URL)}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:?set S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?set S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?set S3_SECRET_ACCESS_KEY}
      # Public base URL for objects (CDN or bucket public URL). Optional but required for public file links.
      S3_PUBLIC_URL_BASE: ${S3_PUBLIC_URL_BASE:-}
      # Set "true" for MinIO / providers that require path-style addressing
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}

      # ---- SMTP (password resets, notifications) ----
      SMTP_HOST: ${SMTP_HOST:?set SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:?set SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD:?set SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM:?set SMTP_FROM (e.g. "CHROMA.LAB <noreply@example.com>")}
      SMTP_SECURE: ${SMTP_SECURE:-false}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5273/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
