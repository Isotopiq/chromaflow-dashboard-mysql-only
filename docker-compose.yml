# Easypanel-friendly compose file for CHROMA.LAB.
# Uses port 5273 on the host (uncommon, avoids clashes with 3000/5173/8080/etc.).
# In Easypanel: create a "Compose" service and point it at this repo —
# Easypanel will pick up the labels and proxy your domain to port 5273.

services:
  chroma-lab:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:?Set VITE_SUPABASE_URL in Easypanel environment variables}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:?Set VITE_SUPABASE_PUBLISHABLE_KEY in Easypanel environment variables}
        VITE_SUPABASE_PROJECT_ID: ${VITE_SUPABASE_PROJECT_ID:?Set VITE_SUPABASE_PROJECT_ID in Easypanel environment variables}
    image: chroma-lab:latest
    container_name: chroma-lab
    restart: unless-stopped
    ports:
      - "5273:5273"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 5273
      # Server-only Supabase credentials (do NOT prefix with VITE_)
      # Server vars default to the VITE_ equivalents so you only need to set
      # the VITE_* trio + SUPABASE_SERVICE_ROLE_KEY in Easypanel.
      SUPABASE_URL: ${SUPABASE_URL:-${VITE_SUPABASE_URL}}
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY:-${VITE_SUPABASE_PUBLISHABLE_KEY}}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:?Set SUPABASE_SERVICE_ROLE_KEY in Easypanel environment variables (server-only, from Supabase dashboard)}
      SUPABASE_PROJECT_ID: ${SUPABASE_PROJECT_ID:-${VITE_SUPABASE_PROJECT_ID}}
      # Optional: Lovable AI gateway key (only if you use AI features)
      LOVABLE_API_KEY: ${LOVABLE_API_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5273/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
